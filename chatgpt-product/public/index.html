<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-origin" content="https://chatgpt-product-builder.myworker-aichatbot.workers.dev">
    <title>L'Oréal — Personal Product Advisor</title>
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/main.css">

    <link rel="stylesheet" href="styles/shop/products.css">
    <link rel="stylesheet" href="styles/shop/selected.css">

    <link rel="stylesheet" href="styles/shop/popup.css">
    <link rel="stylesheet" href="styles/shop/search.css">
    <link rel="stylesheet" href="styles/shop/chat.css">
</head>

<body>
    <header>
        <img class="logo" src="loreal-logo.png">
        <h1>your personal product and routine advisor</h1>
    </header>

    <main>
        <div class="search-field">
            <input id="search-bar" type="text" autocomplete="off" placeholder="Search products…">
            <select id="category-list" name="products">
                <option value="">All Categories</option>
            </select>
        </div>

        <div id="product-list"></div>

        <button id="clear-button">clear all</button>
        <button id="routine-button">generate routine</button>


        <div id="popup">
            <div class="shadow"></div>
            <div class="popup-box">
                <button id="popup-close">&#x2715;</button>
                <div id="popup-image"></div>
                <div class="popup-details">
                    <div id="popup-brand"></div>
                    <div id="popup-name"></div>
                    <div id="popup-category"></div>
                    <div id="popup-description"></div>
                </div>
                <button id="popup-add"></button>
            </div>
        </div>

        <hr>

        <div id="products-selected"></div>

    </main>

    <div class="chat-container">
        <div id="chat-box"></div>

        <div class="input-container">
            <input id="input-field" type="text" autocomplete="off" placeholder="Ask about your skin type…">
            <button id="send-button" type="button">send</button>
        </div>
    </div>

    <footer>
        <ul class="socials">
            <li><a href="https://www.linkedin.com/company/loréal">linkedin</a></li>
            <li><a href="https://www.youtube.com/@loreal">youtube</a></li>
            <li><a href="https://www.instagram.com/lorealgroupe">instagram</a></li>
            <li><a href="https://www.facebook.com/lorealgroupe">facebook</a></li>
        </ul>

        <ul>
            <li><a href="https://www.loreal.com/en/privacy-policy-links">privacy policy</a></li>
            <li><a href="https://www.loreal.com/en/term-of-use">terms of use</a></li>
            <li><a href="https://www.lorealparisusa.com/contact-us">contact us</a></li>
        </ul>

        <div>&copy; L'Oréal. All Rights Reserved.</div>
    </footer>

    <script src="scripts/cart/buttons/clear.js" type="module"></script>
    <script src="scripts/cart/buttons/routine.js" type="module"></script>

    <script src="scripts/cart/checkout/click.js" type="module"></script>
    <script src="scripts/cart/shopping/click.js" type="module"></script>

    <script src="scripts/popup/buttons.js" type="module"></script>

    <script src="scripts/search/search.js" type="module"></script>
    <script src="scripts/chat/send.js" type="module"></script>

    <script src="scripts/main.js" type="module"></script>
</body>

</html>
